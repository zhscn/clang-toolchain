name: Build RPMs

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version (e.g. 22.1.0)"
        required: true
        default: "22.1.0"
      base_version:
        description: "Stage1 base image version (e.g. 22.1.0)"
        required: true
        default: "22.1.0"
      tag:
        description: "Release tag to create/upload to (e.g. v0.1.1)"
        required: true

permissions:
  contents: write
  packages: read

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/clang-base

jobs:
  rpm-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive variables
        id: vars
        run: |
          LLVM_VERSION="${{ inputs.llvm_version }}"
          MAJOR="${LLVM_VERSION%%.*}"
          echo "llvm_version=${LLVM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "llvm_major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "llvm_src=llvm-project-${LLVM_VERSION}.src.tar.xz" >> "$GITHUB_OUTPUT"
          echo "llvm_url=https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/llvm-project-${LLVM_VERSION}.src.tar.xz" >> "$GITHUB_OUTPUT"

      - name: Download LLVM source tarball
        run: curl -fSL -o "${{ steps.vars.outputs.llvm_src }}" "${{ steps.vars.outputs.llvm_url }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull "${{ env.BASE_IMAGE }}:${{ inputs.base_version }}-amd64"

      - name: Build RPM image
        run: |
          docker build -t rpm-amd64 \
            --build-arg BASE_IMAGE="${{ env.BASE_IMAGE }}:${{ inputs.base_version }}-amd64" \
            --build-arg LLVM_MAJOR="${{ steps.vars.outputs.llvm_major }}" \
            --build-arg LLVM_VERSION="${{ steps.vars.outputs.llvm_version }}" \
            --build-arg LLVM_SRC="${{ steps.vars.outputs.llvm_src }}" \
            -f Dockerfile.amd64 .

      - name: Extract RPMs
        run: |
          mkdir -p out
          docker run --rm -v "$PWD/out:/out" rpm-amd64 \
            bash -c 'cp /root/rpmbuild/SRPMS/*.rpm /root/rpmbuild/RPMS/x86_64/*.rpm /out/'

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" --draft --title "LLVM ${{ steps.vars.outputs.llvm_version }}" 2>/dev/null || true
          gh release upload "${{ inputs.tag }}" out/*.rpm --clobber

  rpm-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive variables
        id: vars
        run: |
          LLVM_VERSION="${{ inputs.llvm_version }}"
          MAJOR="${LLVM_VERSION%%.*}"
          echo "llvm_version=${LLVM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "llvm_major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "llvm_src=llvm-project-${LLVM_VERSION}.src.tar.xz" >> "$GITHUB_OUTPUT"
          echo "llvm_url=https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/llvm-project-${LLVM_VERSION}.src.tar.xz" >> "$GITHUB_OUTPUT"

      - name: Download LLVM source tarball
        run: curl -fSL -o "${{ steps.vars.outputs.llvm_src }}" "${{ steps.vars.outputs.llvm_url }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull "${{ env.BASE_IMAGE }}:${{ inputs.base_version }}-aarch64"

      - name: Build RPM image
        run: |
          docker build -t rpm-aarch64 \
            --build-arg BASE_IMAGE="${{ env.BASE_IMAGE }}:${{ inputs.base_version }}-aarch64" \
            --build-arg LLVM_MAJOR="${{ steps.vars.outputs.llvm_major }}" \
            --build-arg LLVM_VERSION="${{ steps.vars.outputs.llvm_version }}" \
            --build-arg LLVM_SRC="${{ steps.vars.outputs.llvm_src }}" \
            -f Dockerfile.aarch64 .

      - name: Extract RPMs
        run: |
          mkdir -p out
          docker run --rm -v "$PWD/out:/out" rpm-aarch64 \
            bash -c 'cp /root/rpmbuild/SRPMS/*.rpm /root/rpmbuild/RPMS/aarch64/*.rpm /out/'

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" --draft --title "LLVM ${{ steps.vars.outputs.llvm_version }}" 2>/dev/null || true
          gh release upload "${{ inputs.tag }}" out/*.rpm --clobber
